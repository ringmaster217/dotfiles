general {
    hide_cursor = true
}

auth {
    fingerprint {
        enabled = true
        ready_message = Scan fingerprint to unlock
        present_message = Scanning...
        retry_delay = 250
    }
}

background {
    monitor =
    path = $env{HYPRLOCK_WALLPAPER}
    color = rgb(1a1a2e)

    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(200, 200, 200, 1.0)
    font_size = 96
    font_family = JetBrainsMono Nerd Font

    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 55
    outline_thickness = 7
    rounding = -1

    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    font_family = JetBrainsMono Nerd Font

    placeholder_text = <i>Password...</i>
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    fail_color = rgb(cc2222)
    check_color = rgb(cc8822)

    fade_on_empty = true
    fade_timeout = 1000
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true

    position = 0, -60
    halign = center
    valign = center
}

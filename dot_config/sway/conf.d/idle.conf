### Idle configuration
#
# Lock after 15 min of idle; turn displays off 5 min after that.
# Also lock before sleep (covers suspend) and on a logind lock event
# (covers lid-close when HandleLidSwitch=lock is set in logind.conf).
#
exec swayidle -w \
    timeout 900  'cachy-lock' \
    timeout 1200 'swaymsg "output * dpms off"' \
        resume   'swaymsg "output * dpms on"' \
    before-sleep 'cachy-lock' \
    lock         'cachy-lock'
